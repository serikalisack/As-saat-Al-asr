<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Islamic Digital Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="clock-container">
            <div id="clock"></div>
            <div id="date"></div>
            <div id="hijri-date"></div>
            <div id="greeting"></div>
        </div>
        <div class="controls">
            <label>
                <input type="checkbox" id="toggle-12-24" aria-label="Switch between 12 and 24 hour format"> 12/24 Hour Format
            </label>
            <label>
                <input type="checkbox" id="toggle-gregorian" checked aria-label="Show or hide Gregorian date"> Show Gregorian Date
            </label>
            <label>
                <input type="checkbox" id="toggle-hijri" checked aria-label="Show or hide Hijri date"> Show Hijri Date
            </label>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
